<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Rental — Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#F5EFE6;
    --ink:#1A2421;
    --petrol:#0F3D3E;
    --petrol-light:#175A5B;
    --cone:#FF6B35;
    --card:#FFFFFF;
    --line:#DED4C2;
    --ok:#2F855A;
    --err:#C53030;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .roadbar{
    background:var(--petrol);
    padding:22px 20px 26px;
    position:relative;
    overflow:hidden;
  }
  .roadbar::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:10px;
    height:2px;
    background-image:repeating-linear-gradient(90deg, var(--cone) 0 14px, transparent 14px 26px);
    opacity:.85;
  }
  .eyebrow{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--cone);
  }
  h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:34px;
    line-height:1;
    margin:6px 0 0;
    color:#fff;
    letter-spacing:.01em;
  }
  .sub{
    color:#CFE3E0;
    font-size:13px;
    margin-top:6px;
  }
  main{
    max-width:520px;
    margin:0 auto;
    padding:20px 16px 60px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
  }
  .card h2{
    font-family:'Barlow Condensed',sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--petrol);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h2::before{
    content:"";
    width:7px;height:7px;
    border-radius:50%;
    background:var(--cone);
    display:inline-block;
  }
  label{
    display:block;
    font-size:12.5px;
    font-weight:500;
    color:#5A6663;
    margin:14px 0 5px;
  }
  label:first-of-type{margin-top:0;}
  input, select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    border-radius:9px;
    font-size:15px;
    font-family:'Inter',sans-serif;
    background:#FBFAF7;
    color:var(--ink);
    transition:border-color .15s;
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--petrol-light);
    background:#fff;
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .row2 > div{min-width:0;}
  button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--cone);
    color:#fff;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:17px;
    letter-spacing:.04em;
    text-transform:uppercase;
    cursor:pointer;
    margin-top:20px;
    transition:transform .1s, background .15s;
  }
  button:active{transform:scale(.98);}
  button:disabled{background:#C9B9A8; cursor:not-allowed;}
  .status{
    margin-top:12px;
    font-size:13.5px;
    padding:10px 12px;
    border-radius:8px;
    display:none;
  }
  .status.ok{display:block; background:#E8F5EE; color:var(--ok); border:1px solid #BEE3CE;}
  .status.err{display:block; background:#FCEBEB; color:var(--err); border:1px solid #F3C6C6;}
  .setup{
    background:#FBF6EC;
    border:1px dashed var(--line);
  }
  .setup p{font-size:13px; color:#5A6663; margin:0 0 10px; line-height:1.5;}
  .setup a{color:var(--petrol);}
  .odo{
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Barlow Condensed',sans-serif;
    font-size:12.5px; letter-spacing:.08em; text-transform:uppercase;
    color:#7A8A86; margin-bottom:14px;
  }
  .odo b{color:var(--petrol); font-size:14px;}
  .hidden{display:none;}
  .link-btn{
    background:none; border:none; color:var(--petrol); text-decoration:underline;
    font-family:'Inter',sans-serif; font-size:12.5px; font-weight:500; text-transform:none;
    letter-spacing:0; padding:0; margin-top:8px; width:auto;
  }
  .scan-card{border-color:var(--petrol-light); background:linear-gradient(180deg,#FBFEFD,#fff);}
  .scan-hint{font-size:13px; color:#5A6663; margin:0 0 14px; line-height:1.5;}
  .secondary-btn{
    width:100%;
    padding:13px;
    border:1.5px dashed var(--petrol-light);
    border-radius:10px;
    background:#F1F7F6;
    color:var(--petrol);
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:15.5px;
    letter-spacing:.03em;
    text-transform:uppercase;
    cursor:pointer;
    margin-top:0;
    transition:background .15s;
  }
  .secondary-btn:active{background:#E4EFED;}
  .secondary-btn:disabled{opacity:.6; cursor:not-allowed;}
  .scan-preview{
    display:block;
    max-width:100%;
    border-radius:10px;
    margin-top:12px;
    border:1px solid var(--line);
  }
  .status.info{display:block; background:#EAF2F6; color:var(--petrol); border:1px solid #C9DCE0;}
</style>
</head>
<body>

<div class="roadbar">
  <div class="eyebrow">Shoots · Customer records</div>
  <h1>New Rental</h1>
  <div class="sub">Adds a row straight into the "customer" tab</div>
</div>

<main>

  <div class="card scan-card">
    <h2>Scan a filled-in form</h2>
    <p class="scan-hint">Take a photo of the paper form and the fields below will be filled in automatically. Always double-check before saving.</p>
    <input type="file" id="scanInput" accept="image/*" capture="environment" class="hidden">
    <button type="button" id="scanBtn" class="secondary-btn">📷 Take photo of form</button>
    <img id="scanPreview" class="scan-preview hidden" alt="Scanned form preview">
    <div class="status" id="scanStatus"></div>
  </div>

  <form id="intakeForm">
    <div class="card">
      <div class="odo">Session entries <b id="sessionCount">0</b></div>
      <h2>Customer</h2>
      <label for="name">Name</label>
      <input id="name" required placeholder="Mr. Christian Jay Verona">

      <label for="nationality">Nationality</label>
      <input id="nationality" placeholder="Philippines">

      <label for="passport">Passport number</label>
      <input id="passport" placeholder="Optional">

      <label for="contact">How to contact them</label>
      <select id="contact">
        <option value=""></option>
        <option value="WhatsApp">WhatsApp</option>
        <option value="Messenger">Messenger</option>
        <option value="Phone">Phone</option>
        <option value="Line">Line</option>
        <option value="other">Other…</option>
      </select>
      <input id="contactOther" placeholder="Enter contact method" class="hidden" style="margin-top:8px;">
    </div>

    <div class="card">
      <h2>Rental</h2>
      <label for="bikeModel">Bike model</label>
      <input id="bikeModel" required placeholder="GT red 2">

      <div class="row2">
        <div>
          <label for="rentingDateFrom">Renting from</label>
          <input id="rentingDateFrom" type="date" required>
        </div>
        <div>
          <label for="returnDate">Return date</label>
          <input id="returnDate" type="date" required>
        </div>
      </div>
      <div class="row2">
        <div>
          <label for="returnTime">Return time</label>
          <input id="returnTime" type="time">
        </div>
        <div>
          <label for="deliverToHotel">Deliver to hotel</label>
          <select id="deliverToHotel">
            <option value="">—</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Payment</h2>
      <div class="row2">
        <div>
          <label for="totalPrice">Total price (฿)</label>
          <input id="totalPrice" type="number" min="0" step="1" placeholder="2500">
        </div>
        <div>
          <label for="paidBy">Paid by</label>
          <select id="paidBy">
            <option value=""></option>
            <option value="cash">Cash</option>
            <option value="scan">Scan</option>
            <option value="wise">Wise</option>
            <option value="revolut">Revolut</option>
          </select>
        </div>
      </div>
    </div>

    <button type="submit" id="submitBtn">Add to sheet</button>
    <div class="status" id="statusBox"></div>
  </form>

</main>

<script>
const scriptUrl = 'https://script.google.com/macros/s/AKfycbwD0PiSNmTMx7zsC99oOQkHQWu37RXiutk0OfRlKbOqCxw8Cdw8PWYXGUoFNVU4Otlh/exec';
let sessionCount = 0;

const form = document.getElementById('intakeForm');
const statusBox = document.getElementById('statusBox');
const submitBtn = document.getElementById('submitBtn');

function setDefaultsToNow() {
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const dateStr = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
  const timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes());
  document.getElementById('rentingDateFrom').value = dateStr;
  document.getElementById('returnTime').value = timeStr;
}

const contactSelect = document.getElementById('contact');
const contactOther = document.getElementById('contactOther');
contactSelect.addEventListener('change', () => {
  if (contactSelect.value === 'other') {
    contactOther.classList.remove('hidden');
    contactOther.required = true;
  } else {
    contactOther.classList.add('hidden');
    contactOther.required = false;
    contactOther.value = '';
  }
});

// ---- Scan-to-fill ----
const scanInput = document.getElementById('scanInput');
const scanBtn = document.getElementById('scanBtn');
const scanPreview = document.getElementById('scanPreview');
const scanStatus = document.getElementById('scanStatus');

scanBtn.addEventListener('click', () => scanInput.click());

scanInput.addEventListener('change', async () => {
  const file = scanInput.files && scanInput.files[0];
  if (!file) return;

  scanStatus.className = 'status info';
  scanStatus.textContent = 'Reading the form…';
  scanBtn.disabled = true;
  scanBtn.textContent = 'Reading…';

  try {
    const { base64, mediaType } = await downscaleImageToBase64(file, 1600);
    scanPreview.src = 'data:' + mediaType + ';base64,' + base64;
    scanPreview.classList.remove('hidden');

    const response = await fetch('/.netlify/functions/scan-form', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base64, mediaType })
    });

    const fields = await response.json();
    if (!response.ok) {
      throw new Error(fields.error || 'Server error');
    }

    applyScannedFields(fields);
  } catch (err) {
    scanStatus.className = 'status err';
    scanStatus.textContent = 'Could not read the form: ' + err.message + '. You can still fill it in manually.';
  } finally {
    scanBtn.disabled = false;
    scanBtn.textContent = '📷 Take photo of form';
    scanInput.value = '';
  }
});

function downscaleImageToBase64(file, maxDim) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = () => reject(new Error('Could not read image file'));
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg' });
    };
    img.onerror = () => reject(new Error('Could not load image'));
    reader.readAsDataURL(file);
  });
}

function applyScannedFields(fields) {
  const filled = [];
  const setVal = (id, val) => {
    if (val === null || val === undefined || val === '') return;
    document.getElementById(id).value = val;
    filled.push(id);
  };

  setVal('name', fields.name);
  setVal('nationality', fields.nationality);
  setVal('passport', fields.passport);
  setVal('bikeModel', fields.bikeModel);
  setVal('rentingDateFrom', fields.rentingDateFrom);
  setVal('returnDate', fields.returnDate);
  setVal('returnTime', fields.returnTime);
  setVal('totalPrice', fields.totalPrice);

  if (fields.deliverToHotel === 'Yes' || fields.deliverToHotel === 'No') {
    document.getElementById('deliverToHotel').value = fields.deliverToHotel;
    filled.push('deliverToHotel');
  }
  if (fields.paidBy && ['cash','scan','wise','revolut'].includes(fields.paidBy)) {
    document.getElementById('paidBy').value = fields.paidBy;
    filled.push('paidBy');
  }

  const knownContacts = ['WhatsApp', 'Messenger', 'Phone', 'Line'];
  if (fields.contactMethod && knownContacts.includes(fields.contactMethod)) {
    contactSelect.value = fields.contactMethod;
    filled.push('contact');
  } else if (fields.contactMethod === 'other' || fields.contactOther) {
    contactSelect.value = 'other';
    contactOther.classList.remove('hidden');
    contactOther.required = true;
    contactOther.value = fields.contactOther || '';
    filled.push('contact');
  }

  let msg = filled.length
    ? 'Filled in ' + filled.length + ' field' + (filled.length === 1 ? '' : 's') + ' from the photo — please check everything before saving.'
    : "Couldn't confidently read any fields — please fill the form in manually.";

  const extras = [];
  if (fields.contactOther && knownContacts.includes(fields.contactMethod)) {
    extras.push('contact detail: ' + fields.contactOther);
  }
  if (fields.otherNotes) {
    extras.push(fields.otherNotes);
  }
  if (extras.length) {
    msg += ' Also noted on the form: ' + extras.join('; ') + '.';
  }

  scanStatus.className = filled.length ? 'status ok' : 'status err';
  scanStatus.textContent = msg;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  statusBox.className = 'status';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Saving…';

  const payload = {
    name: document.getElementById('name').value.trim(),
    nationality: document.getElementById('nationality').value.trim(),
    passport: document.getElementById('passport').value.trim(),
    contact: contactSelect.value === 'other' ? contactOther.value.trim() : contactSelect.value,
    bikeModel: document.getElementById('bikeModel').value.trim(),
    rentingDateFrom: document.getElementById('rentingDateFrom').value,
    returnDate: document.getElementById('returnDate').value,
    returnTime: document.getElementById('returnTime').value,
    deliverToHotel: document.getElementById('deliverToHotel').value,
    totalPrice: document.getElementById('totalPrice').value,
    paidBy: document.getElementById('paidBy').value
  };

  try {
    const res = await fetch(scriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      statusBox.textContent = 'Added — "' + payload.name + '" saved to the sheet.';
      statusBox.className = 'status ok';
      sessionCount++;
      document.getElementById('sessionCount').textContent = sessionCount;
      form.reset();
      contactOther.classList.add('hidden');
      contactOther.required = false;
      setDefaultsToNow();
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  } catch (err) {
    statusBox.textContent = 'Could not save: ' + err.message;
    statusBox.className = 'status err';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Add to sheet';
  }
});

setDefaultsToNow();
</script>

</body>
</html>
